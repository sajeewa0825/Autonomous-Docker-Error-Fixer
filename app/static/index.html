<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Docker Container Manager</title>

<style>
:root{
  --bg:#07111f;
  --bg-2:#0b1728;
  --surface:#0f1c2e;
  --surface-2:#13243a;
  --surface-3:#192d47;
  --card:#101d31;
  --card-2:#12243b;
  --text:#e8eef8;
  --text-soft:#b8c7dc;
  --muted:#87a0bf;
  --border:rgba(148,163,184,.16);
  --primary:#60a5fa;
  --primary-2:#3b82f6;
  --primary-3:#1d4ed8;
  --danger:#f87171;
  --danger-2:#ef4444;
  --success:#4ade80;
  --success-2:#22c55e;
  --warning:#fbbf24;
  --warning-2:#f59e0b;
  --shadow: 0 22px 40px rgba(2,8,23,.38);
  --shadow-soft: 0 10px 24px rgba(2,8,23,.22);
  --radius: 18px;
  --radius-sm: 13px;
  --glass: rgba(15,23,42,.72);
  --glass-2: rgba(15,23,42,.56);
  --header-grad: linear-gradient(135deg, #0f172a 0%, #172554 38%, #1d4ed8 100%);
  --panel-grad: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  --ok-glow: 0 0 0 1px rgba(74,222,128,.16), 0 0 18px rgba(34,197,94,.08);
  --err-glow: 0 0 0 1px rgba(248,113,113,.16), 0 0 18px rgba(239,68,68,.09);
  --pending-glow: 0 0 0 1px rgba(251,191,36,.14), 0 0 18px rgba(245,158,11,.08);
}

*{box-sizing:border-box}

html,body{
  height:100%;
}

body{
  margin:0;
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 24%),
    radial-gradient(circle at top right, rgba(99,102,241,.18), transparent 22%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  overflow:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,.6), transparent 90%);
  opacity:.22;
}

header{
  position:sticky;
  top:0;
  z-index:10;
  background: var(--header-grad);
  color:#fff;
  padding: 16px 20px;
  border-bottom:1px solid rgba(255,255,255,.08);
  box-shadow: 0 18px 40px rgba(2,8,23,.34);
  backdrop-filter: blur(10px);
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:44px;
  height:44px;
  border-radius:16px;
  display:grid;
  place-items:center;
  font-size:20px;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.16);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
}

.brand-text{
  display:flex;
  flex-direction:column;
  line-height:1.08;
}

.brand-text .title{
  font-weight: 900;
  letter-spacing:.24px;
  font-size: 17px;
}

.brand-text .subtitle{
  font-weight: 650;
  opacity:.86;
  font-size: 12px;
}

.header-stats{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.pill{
  padding: 9px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,.10);
  border: 1px solid rgba(255,255,255,.16);
  color:#eff6ff;
  font-size: 12px;
  font-weight: 800;
  display:flex;
  gap:8px;
  align-items:center;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
}

.pill .dot{
  width:8px;
  height:8px;
  border-radius:999px;
  background:#93c5fd;
  box-shadow: 0 0 12px rgba(147,197,253,.6);
}

.layout{
  display:flex;
  height: calc(100vh - 76px);
}

.sidebar{
  width: 368px;
  padding: 16px;
  border-right:1px solid var(--border);
  background: linear-gradient(180deg, rgba(15,23,42,.48), rgba(15,23,42,.22));
  backdrop-filter: blur(10px);
}

.panel{
  height:100%;
  background: var(--panel-grad), var(--glass);
  border:1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--shadow);
  overflow:hidden;
}

.panel .panel-header{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  background: rgba(255,255,255,.02);
}

.panel .panel-header h3{
  margin:0;
  font-size:14px;
  font-weight:850;
  letter-spacing:.25px;
}

.panel .panel-body{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
}

.search-row{
  display:flex;
  gap:10px;
  align-items:center;
}

.input{
  width:100%;
  padding:12px 14px;
  border:1px solid rgba(148,163,184,.18);
  border-radius: 14px;
  outline:none;
  font-size:13px;
  color:var(--text);
  background: rgba(15,23,42,.56);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}
.input::placeholder{
  color:#88a1c0;
}
.input:focus{
  border-color: rgba(96,165,250,.55);
  box-shadow: 0 0 0 4px rgba(59,130,246,.15), inset 0 1px 0 rgba(255,255,255,.04);
}

.btn{
  border:none;
  cursor:pointer;
  border-radius: 13px;
  padding: 10px 13px;
  font-weight: 800;
  font-size: 13px;
  display:inline-flex;
  gap:8px;
  align-items:center;
  justify-content:center;
  transition: transform .08s ease, background .18s ease, opacity .18s ease, box-shadow .18s ease, border-color .18s ease;
  user-select:none;
  box-shadow: var(--shadow-soft);
}

.btn:hover{
  transform: translateY(-1px);
}

.btn:active{
  transform: translateY(1px);
}

.btn.primary{
  background: linear-gradient(180deg, var(--primary) 0%, var(--primary-2) 100%);
  color:#eff6ff;
  box-shadow: 0 10px 20px rgba(59,130,246,.28);
}
.btn.primary:hover{
  background: linear-gradient(180deg, #7bb7fb 0%, var(--primary-2) 100%);
}

.btn.ghost{
  background: rgba(15,23,42,.56);
  color:#dbeafe;
  border:1px solid rgba(147,197,253,.18);
}
.btn.ghost:hover{
  background: rgba(30,41,59,.76);
}

.btn.danger{
  background: linear-gradient(180deg, var(--danger) 0%, var(--danger-2) 100%);
  color:#fff5f5;
  box-shadow: 0 10px 20px rgba(239,68,68,.24);
}
.btn.danger:hover{
  opacity:.96;
}

.btn.gray{
  background: linear-gradient(180deg, #64748b 0%, #475569 100%);
  color:#f8fafc;
}
.btn.gray:hover{
  opacity:.96;
}

.btn.small{
  padding:8px 11px;
  border-radius: 11px;
  font-size:12px;
}

.btn[disabled]{
  opacity:.56;
  cursor:not-allowed;
  transform:none !important;
  box-shadow:none !important;
}

.badge{
  font-size:11px;
  padding: 5px 9px;
  border-radius: 999px;
  font-weight: 850;
  display:inline-flex;
  gap:6px;
  align-items:center;
  border:1px solid transparent;
  letter-spacing:.2px;
}

.badge.enabled{
  background: rgba(34,197,94,.12);
  color: #9af0b2;
  border-color: rgba(74,222,128,.18);
}

.badge.disabled{
  background: rgba(148,163,184,.10);
  color: #b8c7dc;
  border-color: rgba(148,163,184,.16);
}

.badge.error{
  background: rgba(239,68,68,.12);
  color: #fca5a5;
  border-color: rgba(248,113,113,.18);
}

.dot2{
  width:8px;
  height:8px;
  border-radius:999px;
  display:inline-block;
}
.dot2.enabled{
  background: var(--success);
  box-shadow: 0 0 10px rgba(34,197,94,.65);
}
.dot2.disabled{
  background: #94a3b8;
}
.dot2.error{
  background: var(--danger);
  box-shadow: 0 0 10px rgba(239,68,68,.55);
}

.container-list{
  max-height: calc(100vh - 290px);
  overflow:auto;
  padding: 10px;
}

.container-list::-webkit-scrollbar,
.main::-webkit-scrollbar,
.log-content::-webkit-scrollbar{
  width:10px;
  height:10px;
}

.container-list::-webkit-scrollbar-thumb,
.main::-webkit-scrollbar-thumb,
.log-content::-webkit-scrollbar-thumb{
  background: rgba(148,163,184,.18);
  border-radius:999px;
}

.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding: 12px 12px;
  margin: 8px 0;
  border-radius: 16px;
  border: 1px solid rgba(148,163,184,.12);
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  cursor:pointer;
  transition: box-shadow .18s ease, transform .08s ease, border-color .18s ease, background .18s ease;
}
.item:hover{
  box-shadow: 0 14px 22px rgba(2,8,23,.24);
  border-color: rgba(96,165,250,.20);
  background: linear-gradient(180deg, rgba(96,165,250,.08), rgba(255,255,255,.03));
}
.item:active{
  transform: translateY(1px);
}

.item .left{
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:0;
}
.item .name{
  font-weight: 900;
  font-size: 13px;
  color:#f5f9ff;
  overflow:hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 210px;
}
.item .meta{
  font-size: 12px;
  color: var(--muted);
}

.main{
  flex:1;
  padding: 16px;
  overflow:auto;
}

.grid{
  display:grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

.log-box{
  background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)), var(--glass);
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--shadow);
  overflow:hidden;
}

.log-head{
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
}

.log-title{
  display:flex;
  align-items:center;
  gap:10px;
  min-width: 0;
}
.log-title .name{
  font-weight: 950;
  font-size: 14px;
  color:#f8fbff;
  overflow:hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 520px;
}

.log-actions{
  display:flex;
  gap:8px;
  flex-wrap: wrap;
  justify-content:flex-end;
}

.log-content{
  height: 280px;
  overflow:auto;
  padding: 14px 16px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  font-size: 12.5px;
  line-height: 1.58;
  background:
    linear-gradient(180deg, rgba(2,6,23,.18), rgba(2,6,23,.42)),
    #06101d;
  color: #dbe7f6;
  white-space: pre-wrap;
  letter-spacing:.1px;
}

.log-content .hint{
  color:#8ca5c3;
}

.footer-note{
  padding: 10px 14px;
  color: var(--muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
  background: rgba(255,255,255,.02);
}

.toast{
  position: fixed;
  right: 18px;
  bottom: 18px;
  padding: 13px 15px;
  border-radius: 15px;
  background: rgba(15,23,42,.94);
  color: #f1f5f9;
  border:1px solid rgba(148,163,184,.15);
  box-shadow: 0 18px 30px rgba(2,8,23,.35);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .24s ease, transform .24s ease;
  font-size: 13px;
  max-width: 360px;
  backdrop-filter: blur(12px);
}
.toast.show{
  opacity: 1;
  transform: translateY(0);
}

.modal{
  position: fixed;
  inset: 0;
  background: rgba(2,8,23,.58);
  display:none;
  align-items:center;
  justify-content:center;
  padding: 18px;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.modal .card{
  width: 440px;
  max-width: 92vw;
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)), #0f1c2e;
  border:1px solid var(--border);
  border-radius: 22px;
  box-shadow: 0 26px 54px rgba(2,8,23,.46);
  overflow:hidden;
}
.modal .card .top{
  padding: 15px 16px;
  border-bottom: 1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  background: rgba(255,255,255,.02);
}
.modal h3{
  margin:0;
  font-size: 14px;
  color:#f8fbff;
}
.modal .card .body{
  padding: 16px;
}
.modal .row{
  display:flex;
  gap:10px;
  margin-top: 12px;
}
.modal .row .btn{
  flex:1;
}

.helper{
  font-size: 12px;
  color: var(--muted);
  margin-top: 8px;
  line-height: 1.45;
}

.kbd{
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color:#dbeafe;
  background: rgba(15,23,42,.66);
  border:1px solid rgba(148,163,184,.16);
  padding: 3px 7px;
  border-radius: 9px;
}

.info{
  border-top: 1px solid var(--border);
  padding: 12px 14px;
  background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.6;
}
.info b{
  color: #f8fbff;
}
.info > div + div{
  margin-top:5px;
}

.action-status{
  margin-top: 12px;
  padding: 11px 12px;
  border-radius: 14px;
  font-size: 12px;
  font-weight: 700;
  border:1px solid transparent;
}

.action-status.pending{
  background: rgba(245,158,11,.11);
  color: #fcd34d;
  border-color: rgba(251,191,36,.16);
  box-shadow: var(--pending-glow);
}

.action-status.success{
  background: rgba(34,197,94,.10);
  color: #a7f3be;
  border-color: rgba(74,222,128,.16);
  box-shadow: var(--ok-glow);
}

.action-status.failed{
  background: rgba(239,68,68,.10);
  color: #fecaca;
  border-color: rgba(248,113,113,.16);
  box-shadow: var(--err-glow);
}

.footer-note,
.helper,
.item .meta,
.info,
.panel .panel-header h3,
.brand-text .subtitle{
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

@media (max-width: 980px){
  .layout{
    flex-direction: column;
    height:auto;
    overflow:auto;
  }
  .sidebar{
    width: 100%;
    border-right: none;
    border-bottom:1px solid var(--border);
  }
  .container-list{
    max-height: 250px;
  }
  body{
    overflow:auto;
  }
}

@media (max-width: 720px){
  header{
    padding:14px;
  }
  .topbar{
    flex-direction:column;
    align-items:flex-start;
  }
  .header-stats{
    width:100%;
    justify-content:flex-start;
  }
  .log-head{
    flex-direction:column;
    align-items:flex-start;
  }
  .log-actions{
    width:100%;
    justify-content:flex-start;
  }
}
</style>
</head>

<body>
<header>
  <div class="topbar">
    <div class="brand">
      <div class="logo">🐳</div>
      <div class="brand-text">
        <div class="title">Container Manager</div>
        <div class="subtitle">Docker Monitoring Dashboard</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="pill"><span class="dot"></span><span id="hdrEnabled">0 enabled</span></div>
      <div class="pill"><span class="dot"></span><span id="hdrTotal">0 total</span></div>
      <button class="btn ghost small" onclick="refresh()">↻ Refresh</button>
      <button class="btn primary small" onclick="openAddModal()">➕ Add</button>
    </div>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="panel">
      <div class="panel-header">
        <h3>Containers</h3>
        <span class="kbd">Search</span>
      </div>

      <div class="panel-body">
        <div class="search-row">
          <input id="search" class="input" placeholder="Search containers..." oninput="render()" />
          <button class="btn ghost" onclick="refresh()">↻</button>
        </div>
      </div>

      <div class="container-list" id="containerList"></div>
      <div class="footer-note" id="counts">Loading...</div>
    </div>
  </div>

  <div class="main">
    <div class="grid" id="logGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="addModal">
  <div class="card">
    <div class="top">
      <h3>Add container</h3>
      <button class="btn ghost small" onclick="closeAddModal()">✕</button>
    </div>
    <div class="body">
      <label style="font-size:12px;color:var(--text-soft);font-weight:800">Container name</label>
      <input id="newContainerName" class="input" placeholder="e.g. log_2" />
      <div class="helper">
        Tip: the name must match an existing Docker container name.
      </div>
      <div class="row">
        <button class="btn primary" onclick="addContainer()">Add & Enable</button>
        <button class="btn gray" onclick="closeAddModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="confirmModal">
  <div class="card">
    <div class="top">
      <h3 id="confirmTitle">Confirm</h3>
      <button class="btn ghost small" onclick="closeConfirm()">✕</button>
    </div>
    <div class="body">
      <div id="confirmText" style="font-size:13px;color:var(--text);line-height:1.6"></div>
      <div class="row">
        <button class="btn danger" id="confirmYes">Yes</button>
        <button class="btn gray" onclick="closeConfirm()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
const __cfg = window.__APP_CONFIG__ || {};

const API = (String(__cfg.apiBaseUrl || "").trim())
  ? String(__cfg.apiBaseUrl).replace(/\/+$/, "")
  : window.location.origin;

const WS_BASE = API.startsWith("https://")
  ? API.replace("https://", "wss://")
  : API.replace("http://", "ws://");

const sockets = {};
const socketState = {};
const logs = {};
const intentionalClose = {};
const aiState = {};
const actionInFlight = {};

let containers = [];

const $ = (id) => document.getElementById(id);

function showToast(message){
  const t = $("toast");
  t.textContent = message;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2600);
}

function openAddModal(){
  $("addModal").style.display = "flex";
  $("newContainerName").value = "";
  setTimeout(()=> $("newContainerName").focus(), 50);
}
function closeAddModal(){ $("addModal").style.display = "none"; }

function openConfirm(title, text, onYes){
  $("confirmTitle").textContent = title;
  $("confirmText").textContent = text;
  $("confirmYes").onclick = () => { closeConfirm(); onYes(); };
  $("confirmModal").style.display = "flex";
}
function closeConfirm(){ $("confirmModal").style.display = "none"; }

async function apiFetch(url, options={}){
  try{
    const res = await fetch(url, options);
    if(!res.ok){
      const txt = await res.text().catch(()=> "");
      throw new Error(`${res.status} ${res.statusText}${txt ? " - " + txt : ""}`);
    }
    const ct = res.headers.get("content-type") || "";
    if(ct.includes("application/json")) return await res.json();
    return await res.text();
  }catch(e){
    showToast(`⚠️ ${e.message}`);
    throw e;
  }
}

async function refresh(){
  Object.keys(sockets).forEach(name => disconnectStream(name, true));
  containers = await apiFetch(`${API}/container/list`);
  render();
}

function render(){
  const filter = ($("search").value || "").toLowerCase().trim();
  const list = $("containerList");
  const grid = $("logGrid");
  list.innerHTML = "";
  grid.innerHTML = "";

  const filtered = containers.filter(c => c.name.toLowerCase().includes(filter));

  const enabledCount = containers.filter(c=>c.enabled===1 || c.enabled===true).length;
  const totalCount = containers.length;
  $("counts").textContent = `${enabledCount} enabled • ${totalCount} total`;
  $("hdrEnabled").textContent = `${enabledCount} enabled`;
  $("hdrTotal").textContent = `${totalCount} total`;

  filtered.forEach(c => {
    renderContainerRow(c);
    renderLogCard(c);

    if (c.enabled === 1 || c.enabled === true) connectStream(c.name);
    else disconnectStream(c.name, true);
  });
}

function statusBadge(c){
  const enabled = (c.enabled === 1 || c.enabled === true);
  const state = socketState[c.name] || "ok";
  if (!enabled) return `<span class="badge disabled"><span class="dot2 disabled"></span>DISABLED</span>`;
  if (state === "error") return `<span class="badge error"><span class="dot2 error"></span>ERROR</span>`;
  return `<span class="badge enabled"><span class="dot2 enabled"></span>ENABLED</span>`;
}

function renderContainerRow(c){
  const el = document.createElement("div");
  el.className = "item";
  el.innerHTML = `
    <div class="left">
      <div class="name">${escapeHtml(c.name)}</div>
      <div class="meta">${(c.enabled===1||c.enabled===true) ? "Streaming logs" : "Not streaming"}</div>
    </div>
    ${statusBadge(c)}
  `;
  el.onclick = () => $("box-"+cssSafe(c.name))?.scrollIntoView({behavior:"smooth", block:"start"});
  $("containerList").appendChild(el);
}

function renderLogCard(c){
  const enabled = (c.enabled === 1 || c.enabled === true);
  const hasLogs = logs[c.name] && logs[c.name].length > 0;

  const a = aiState[c.name] || {};
  const analysis = a.analysis || null;
  const suggestion = a.suggestion || null;
  const approval = a.approval || null;
  const actionResult = a.actionResult || null;

  const card = document.createElement("div");
  card.className = "log-box";
  card.id = "box-" + cssSafe(c.name);

  const infoBlock = buildInfoBlock(c.name, analysis, suggestion, approval, actionResult);

  card.innerHTML = `
    <div class="log-head">
      <div class="log-title">
        <div class="name">${escapeHtml(c.name)}</div>
        <div id="badge-${cssSafe(c.name)}">${statusBadge(c)}</div>
      </div>

      <div class="log-actions">
        ${enabled
          ? `<button class="btn gray small" onclick="toggleEnabled('${jsEscape(c.name)}', false)">Disable</button>`
          : `<button class="btn primary small" onclick="toggleEnabled('${jsEscape(c.name)}', true)">Enable</button>`
        }
        <button class="btn ghost small" onclick="clearLogs('${jsEscape(c.name)}')">🧹 Clear</button>
        <button class="btn danger small" onclick="confirmDelete('${jsEscape(c.name)}')">Delete</button>
      </div>
    </div>

    ${infoBlock}

    <div class="log-content" id="logs-${cssSafe(c.name)}">${
      hasLogs ? escapeHtml(logs[c.name]) : `<span class="hint">No logs yet. Enable the container to start streaming.</span>`
    }</div>

    <div class="footer-note">
  
    </div>
  `;
  $("logGrid").appendChild(card);
}

function buildInfoBlock(containerName, analysis, suggestion, approval, actionResult){
  let html = `<div class="info">`;

  if (analysis){
    const st = (analysis.status || "").toUpperCase();
    const conf = (analysis.confidence != null) ? Number(analysis.confidence).toFixed(2) : "-";
    html += `<div><b>Analysis:</b> ${escapeHtml(st)} (conf ${conf}) — ${escapeHtml(analysis.summary || "")}</div>`;
  } else {
    html += `<div><b>Analysis:</b> —</div>`;
  }

  if (suggestion){
    const sconf = (suggestion.confidence != null) ? Number(suggestion.confidence).toFixed(2) : "-";
    html += `<div style="margin-top:6px"><b>Suggestion:</b> ${escapeHtml(suggestion.command || "")} (conf ${sconf})</div>`;
    if (suggestion.reason) html += `<div><b>Reason:</b> ${escapeHtml(suggestion.reason)}</div>`;
    if (suggestion.source) html += `<div><b>Source:</b> ${escapeHtml(suggestion.source)}</div>`;
  } else {
    html += `<div style="margin-top:6px"><b>Suggestion:</b> —</div>`;
  }

  if (approval && approval.action_id){
    const thr = (approval.threshold != null) ? Number(approval.threshold).toFixed(2) : "-";
    const c = (approval.confidence != null) ? Number(approval.confidence).toFixed(2) : "-";
    const executing = approval.status === "executing";
    const disabledAttr = executing ? "disabled" : "";
    const label = executing ? "⏳ Executing..." : "✅ Approve & Execute";

    html += `<div class="action-status pending">Approval required (conf ${c} / threshold ${thr})</div>`;
    html += `<div style="margin-top:8px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn primary small" ${disabledAttr} onclick="approveAction('${jsEscape(containerName)}')">${label}</button>
      <button class="btn danger small" ${disabledAttr} onclick="denyAction('${jsEscape(containerName)}')">⛔ Deny</button>
    </div>`;
  }

  if (actionResult){
    const st = String(actionResult.status || "").toLowerCase();
    const cls = (st === "executed" || st === "denied") ? "success" : (st === "failed" ? "failed" : "pending");
    html += `<div class="action-status ${cls}"><b>Last action:</b> ${escapeHtml(actionResult.status || "")} — ${escapeHtml(actionResult.message || "")}</div>`;
  }

  html += `</div>`;
  return html;
}

function rerenderCard(){
  render();
}

function updateBadges(name){
  const c = containers.find(x => x.name === name);
  if (!c) return;
  const badgeEl = $("badge-"+cssSafe(name));
  if (badgeEl) badgeEl.innerHTML = statusBadge(c);
}

function connectStream(name){
  if (sockets[name]) return;

  intentionalClose[name] = false;
  socketState[name] = "ok";

  const ws = new WebSocket(`${WS_BASE}/ws/logs/${encodeURIComponent(name)}`);
  sockets[name] = ws;

  ws.onopen = () => {
    socketState[name] = "ok";
    updateBadges(name);
  };

  ws.onmessage = (e) => {
    const raw = e.data ?? "";
    let msg = null;
    try { msg = JSON.parse(raw); } catch { msg = null; }

    if (msg && msg.type){
      handleEvent(name, msg);
      return;
    }

    appendLog(name, raw);
  };

  ws.onerror = () => {
    socketState[name] = "error";
    updateBadges(name);
    showToast(`⚠️ Log stream error for ${name}`);
  };

  ws.onclose = () => {
    delete sockets[name];

    if (!intentionalClose[name]) {
      const c = containers.find(x => x.name === name);
      const enabled = c && (c.enabled === 1 || c.enabled === true);
      if (enabled) socketState[name] = "error";
    } else {
      socketState[name] = "ok";
    }
    updateBadges(name);
  };
}

function handleEvent(containerName, msg){
  aiState[containerName] = aiState[containerName] || {};

  if (msg.type === "ping") return;

  if (msg.type === "log"){
    appendLog(containerName, msg.line || "");
    return;
  }

  if (msg.type === "analysis"){
    aiState[containerName].analysis = {
      status: msg.status,
      summary: msg.summary,
      confidence: msg.confidence
    };
    rerenderCard();
    return;
  }

  if (msg.type === "fix_suggestion"){
    aiState[containerName].suggestion = {
      command: msg.command,
      confidence: msg.confidence,
      reason: msg.reason,
      source: msg.source
    };
    rerenderCard();
    return;
  }

  if (msg.type === "approval_required"){
    aiState[containerName].approval = {
      action_id: msg.action_id,
      command: msg.command,
      confidence: msg.confidence,
      threshold: msg.threshold,
      reason: msg.reason,
      status: "pending"
    };
    rerenderCard();
    showToast(`🧑‍⚕️ Approval required for ${containerName}`);
    return;
  }

  if (msg.type === "action_result"){
    aiState[containerName].actionResult = {
      action_id: msg.action_id,
      status: msg.status,
      message: msg.message
    };

    if (aiState[containerName].approval && aiState[containerName].approval.action_id === msg.action_id){
      aiState[containerName].approval = null;
    }

    delete actionInFlight[msg.action_id];

    rerenderCard();
    showToast(`✅ Action ${msg.status} for ${containerName}`);
    return;
  }

  if (msg.type === "system_error"){
    showToast(`⚠️ ${containerName}: ${msg.message || "system error"}`);
    return;
  }
}

function appendLog(name, line){
  if (!line) return;

  logs[name] = (logs[name] || "") + line + "\n";

  const parts = logs[name].split("\n");
  if (parts.length > 5000) logs[name] = parts.slice(-5000).join("\n");

  const el = $("logs-" + cssSafe(name));
  if (el) {
    el.textContent = logs[name];
    el.scrollTop = el.scrollHeight;
  }
}

function disconnectStream(name, intentional=false){
  intentionalClose[name] = intentional;

  if (sockets[name]) {
    try { sockets[name].close(); } catch {}
    delete sockets[name];
  }

  if (intentional) socketState[name] = "ok";
  updateBadges(name);
}

async function addContainer(){
  const name = $("newContainerName").value.trim();
  if (!name) { showToast("⚠️ Please enter a container name"); return; }

  await apiFetch(`${API}/container/add`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ name, enabled: 1 })
  });

  closeAddModal();
  showToast(`✅ Added & enabled: ${name}`);
  await refresh();
}

function confirmDelete(name){
  openConfirm(
    "Delete container",
    `Delete '${name}' from the database? This will stop streaming and remove it from the dashboard.`,
    async () => {
      disconnectStream(name, true);
      delete logs[name];
      delete aiState[name];

      await apiFetch(`${API}/container/delete/${encodeURIComponent(name)}`, { method: "DELETE" });
      showToast(`🗑 Deleted: ${name}`);
      await refresh();
    }
  );
}

function toggleEnabled(name, shouldEnable){
  const action = shouldEnable ? "Enable" : "Disable";
  const enabledValue = shouldEnable ? 1 : 0;

  openConfirm(
    `${action} container`,
    `${action} '${name}'?`,
    async () => {
      await apiFetch(`${API}/container/update/${encodeURIComponent(name)}`, {
        method: "PATCH",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ enabled: enabledValue })
      });

      const idx = containers.findIndex(c => c.name === name);
      if (idx >= 0) containers[idx].enabled = enabledValue;

      if (shouldEnable) {
        showToast(`🟢 Enabled: ${name}`);
        connectStream(name);
      } else {
        showToast(`⛔ Disabled: ${name}`);
        disconnectStream(name, true);
      }

      render();
    }
  );
}

function clearLogs(name){
  logs[name] = "";
  const el = $("logs-" + cssSafe(name));
  if (el) el.innerHTML = `<span class="hint">Logs cleared. Waiting for new logs...</span>`;
  showToast(`🧹 Cleared logs: ${name}`);
}

async function approveAction(containerName){
  const a = aiState[containerName] || {};
  const approval = a.approval;

  if (!approval || !approval.action_id){
    showToast("⚠️ No pending approval found");
    return;
  }

  const actionId = approval.action_id;

  if (actionInFlight[actionId]){
    showToast("⏳ Action already executing");
    return;
  }
  actionInFlight[actionId] = true;

  aiState[containerName].approval.status = "executing";
  rerenderCard();

  try{
    await apiFetch(`${API}/actions/${encodeURIComponent(actionId)}`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ approve: true })
    });

    showToast(`✅ Approved action for ${containerName}`);
  }catch(e){
    delete actionInFlight[actionId];
    if (aiState[containerName].approval && aiState[containerName].approval.action_id === actionId){
      aiState[containerName].approval.status = "pending";
    }
    rerenderCard();
  }
}

async function denyAction(containerName){
  const a = aiState[containerName] || {};
  const approval = a.approval;

  if (!approval || !approval.action_id){
    showToast("⚠️ No pending approval found");
    return;
  }

  const actionId = approval.action_id;

  if (actionInFlight[actionId]){
    showToast("⏳ Action already executing");
    return;
  }
  actionInFlight[actionId] = true;

  aiState[containerName].approval.status = "executing";
  rerenderCard();

  try{
    await apiFetch(`${API}/actions/${encodeURIComponent(actionId)}`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ approve: false })
    });

    showToast(`⛔ Denied action for ${containerName}`);
  }catch(e){
    delete actionInFlight[actionId];
    if (aiState[containerName].approval && aiState[containerName].approval.action_id === actionId){
      aiState[containerName].approval.status = "pending";
    }
    rerenderCard();
  }
}

function cssSafe(s){
  return String(s).replace(/[^a-zA-Z0-9_-]/g, "_");
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function jsEscape(str){
  return String(str)
    .replaceAll("\\", "\\\\")
    .replaceAll("'", "\\'");
}

refresh();
</script>
